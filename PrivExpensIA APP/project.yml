name: PrivExpensIA
options:
  bundleIdPrefix: com.minhtam
  deploymentTarget:
    iOS: "17.0"
  developmentTeam: WY5K9T67FG
  xcodeVersion: "15.0"
  
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.minhtam.ExpenseAI
    DEVELOPMENT_TEAM: WY5K9T67FG
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "4"
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      ENABLE_TESTABILITY: YES
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: "wholemodule"
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      ENABLE_BITCODE: YES
      STRIP_INSTALLED_PRODUCT: YES
      STRIP_SWIFT_SYMBOLS: YES
      DEPLOYMENT_POSTPROCESSING: YES
      VALIDATE_PRODUCT: YES
    
targets:
  PrivExpensIA:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PrivExpensIA
        excludes:
          - "**/*.xcodeproj"
          - "**/OCRTests.swift"
          - "**/CoreDataManagerTests.swift"
          - "**/QwenPerformanceTests.swift"
          - "**/QwenEdgeCaseTests.swift"
          - "**/IntensiveStressTests.swift"
          - "**/RegressionTests.swift"
          - "**/generate_app_icon.swift"
    resources:
      - path: PrivExpensIA/Base.lproj
      - path: PrivExpensIA/en.lproj
      - path: PrivExpensIA/fr.lproj
      - path: PrivExpensIA/de.lproj
      - path: PrivExpensIA/it.lproj
      - path: PrivExpensIA/es.lproj
      - path: PrivExpensIA/ja.lproj
      - path: PrivExpensIA/ko.lproj
      - path: PrivExpensIA/sk.lproj
      - path: PrivExpensIA/fr-CH.lproj
      - path: PrivExpensIA/de-CH.lproj
      - path: PrivExpensIA/it-CH.lproj
    info:
      path: PrivExpensIA/Info.plist
      properties:
        CFBundleDisplayName: PrivExpensIA
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleName: PrivExpensIA
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: PrivExpensIA needs camera access to scan receipts for automatic expense tracking
        NSPhotoLibraryUsageDescription: PrivExpensIA needs photo library access to select receipt images for processing
        NSPhotoLibraryAddUsageDescription: PrivExpensIA saves processed receipts to your photo library for backup
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: true
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: "Default Configuration"
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).SceneDelegate"
    settings:
      base:
        INFOPLIST_FILE: PrivExpensIA/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.minhtam.ExpenseAI
        DEVELOPMENT_TEAM: WY5K9T67FG
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
  PrivExpensIAUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PrivExpensIAUITests
    dependencies:
      - target: PrivExpensIA
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.minhtam.ExpenseAIUITests
        DEVELOPMENT_TEAM: WY5K9T67FG
        SWIFT_VERSION: "5.0"

  VideoTestApp:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: VideoTestApp
    info:
      path: VideoTestApp/Info.plist
      properties:
        CFBundleName: VideoTestApp
        CFBundleDisplayName: VideoTestApp
        CFBundleIdentifier: com.minhtam.VideoTestApp
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.minhtam.VideoTestApp
        DEVELOPMENT_TEAM: WY5K9T67FG
        CODE_SIGN_IDENTITY: "-"
        GENERATE_INFOPLIST_FILE: NO

schemes:
  PrivExpensIA:
    build:
      targets:
        PrivExpensIA: [run, build, profile, archive, analyze, test]
        PrivExpensIAUITests: [test]
    test:
      gatherCoverage: false
      targets:
        - target: PrivExpensIAUITests
  PrivExpensIAUITests:
    build:
      targets:
        PrivExpensIA: [test]
        PrivExpensIAUITests: [test]
    test:
      gatherCoverage: false
      targets:
        - target: PrivExpensIAUITests
  VideoTestApp:
    build:
      targets:
        VideoTestApp: [run, build]
